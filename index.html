<!doctype html>
<html lang="pt-BR" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Press</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lilita+One&amp;family=Nunito:wght@600;700;800;900&amp;display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-color: #3252bb;
      --surface-color: #2bb5d8;
      --text-color: #ffffff;
      --primary-action: #00b5fd;
      --secondary-action: #0099ff;
    }

    html, body { height: 100%; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg-color);
      color: var(--text-color);
    }

    .app-wrapper {
      width: 100%;
      height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      background: var(--bg-color);
    }

    .font-brawl { font-family: 'Lilita One', cursive; }

    .brawl-gradient {
      background: linear-gradient(135deg, var(--primary-action) 0%, #ff3d00 100%);
    }

    .card-surface {
      background: var(--surface-color);
      border: 2px solid rgba(255,255,255,0.08);
    }

    .news-card {
      transition: transform 0.25s cubic-bezier(.4,2,.6,1), box-shadow 0.25s ease;
      cursor: pointer;
    }
    .news-card:hover {
      transform: translateY(-6px) scale(1.02);
      box-shadow: 0 12px 40px rgba(255,107,0,0.3);
    }

    .tag-new {
      background: var(--primary-action);
      animation: pulse-tag 2s infinite;
    }
    .tag-event { background: #e91e63; }
    .tag-update { background: #00bcd4; }
    .tag-balance { background: #8bc34a; }
    .tag-community { background: #9c27b0; }

    @keyframes pulse-tag {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,107,0,0.5); }
      50% { box-shadow: 0 0 12px 4px rgba(255,107,0,0.3); }
    }

    @keyframes slide-up {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .animate-card {
      animation: slide-up 0.5s ease forwards;
      opacity: 0;
    }

    .featured-banner {
      position: relative;
      overflow: hidden;
      border-radius: 20px;
      min-height: 280px;
    }

    .featured-banner::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 20%, rgba(26,10,46,0.95) 100%);
      z-index: 1;
    }

    .featured-bg-pattern {
      position: absolute;
      inset: 0;
      background: 
        radial-gradient(circle at 20% 30%, rgba(255,107,0,0.4) 0%, transparent 50%),
        radial-gradient(circle at 80% 60%, rgba(255,215,0,0.3) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(233,30,99,0.2) 0%, transparent 60%);
    }

    .star-decoration {
      position: absolute;
      color: var(--secondary-action);
      opacity: 0.15;
      font-size: 120px;
      z-index: 0;
    }

    .nav-tab {
      padding: 8px 18px;
      border-radius: 30px;
      font-weight: 800;
      font-size: 14px;
      transition: all 0.3s ease;
      cursor: pointer;
      border: 2px solid transparent;
      white-space: nowrap;
    }
    .nav-tab.active {
      background: var(--primary-action);
      color: white;
      border-color: var(--secondary-action);
      box-shadow: 0 4px 20px rgba(255,107,0,0.4);
    }
    .nav-tab:not(.active):hover {
      background: rgba(255,255,255,0.1);
    }

    .like-btn, .share-btn {
      transition: transform 0.2s ease;
    }
    .like-btn:hover, .share-btn:hover {
      transform: scale(1.2);
    }
    .like-btn.liked {
      color: #ff4081;
    }

    .time-badge {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
    }

    .scroll-top-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--primary-action);
      color: white;
      border: 3px solid var(--secondary-action);
      cursor: pointer;
      transition: all 0.3s ease;
      opacity: 0;
      pointer-events: none;
      z-index: 50;
    }
    .scroll-top-btn.visible {
      opacity: 1;
      pointer-events: auto;
    }
    .scroll-top-btn:hover {
      transform: scale(1.1);
    }

    .trophy-icon {
      display: inline-block;
      width: 20px;
      height: 20px;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-color); }
    ::-webkit-scrollbar-thumb { background: var(--primary-action); border-radius: 3px; }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div class="app-wrapper" id="appWrapper"><!-- Header -->
   <header class="sticky top-0 z-40 w-full" style="background: linear-gradient(180deg, var(--bg-color) 60%, transparent);">
    <div class="max-w-4xl mx-auto px-4 pt-4 pb-2">
     <div class="flex items-center justify-between mb-3">
      <div class="flex items-center gap-3"><!-- Brawl Star Logo SVG -->
       <div class="w-10 h-10 rounded-xl brawl-gradient flex items-center justify-center shadow-lg" style="border: 2px solid var(--secondary-action);">
        <svg width="22" height="22" viewbox="0 0 24 24" fill="none"><polygon points="12,2 15,9 22,9 16.5,14 18.5,21 12,17 5.5,21 7.5,14 2,9 9,9" fill="#FFD700" stroke="#fff" stroke-width="1" />
        </svg>
       </div>
       <h1 id="siteTitle" class="font-brawl text-2xl tracking-wide" style="color: var(--secondary-action); text-shadow: 2px 2px 0 rgba(0,0,0,0.5);">BRAWL NEWS</h1>
      </div>
      <div class="flex items-center gap-2"><button id="searchToggle" class="w-9 h-9 rounded-full flex items-center justify-center" style="background: var(--surface-color);"> <i data-lucide="search" style="width:18px;height:18px;color:var(--text-color);"></i> </button>
      </div>
     </div><!-- Search Bar (hidden by default) -->
     <div id="searchBar" class="hidden mb-3 relative"><input id="searchInput" type="text" placeholder="Buscar notícias..." class="w-full rounded-xl px-4 py-2.5 text-sm font-bold outline-none" style="background: var(--surface-color); color: var(--text-color); border: 2px solid var(--primary-action);"> <button id="searchClose" class="absolute right-3 top-1/2 -translate-y-1/2"> <i data-lucide="x" style="width:18px;height:18px;color:var(--text-color);"></i> </button>
     </div><!-- Category Tabs -->
     <nav class="flex gap-2 overflow-x-auto pb-2 -mx-1 px-1" id="categoryNav" style="scrollbar-width: none;"><button class="nav-tab active" data-cat="all">⭐ Todos</button> <button class="nav-tab" data-cat="new">🔥 Novidades</button> <button class="nav-tab" data-cat="event">🏆 Eventos</button> <button class="nav-tab" data-cat="update">🔧 Atualizações</button> <button class="nav-tab" data-cat="balance">⚖️ Balanceamento</button> <button class="nav-tab" data-cat="community">🎨 Comunidade</button>
     </nav>
    </div>
   </header><!-- Main Content -->
   <main class="max-w-4xl mx-auto px-4 pb-24" id="mainContent"><!-- Featured Banner -->
    <section class="featured-banner mb-6 animate-card" style="animation-delay: 0.1s;" id="featuredBanner" data-cat="new">
     <div class="featured-bg-pattern"></div>
     <div class="star-decoration" style="top: -30px; right: -20px;">
      ★
     </div>
     <div class="star-decoration" style="bottom: 20px; left: -10px; font-size: 60px;">
      ★
     </div><!-- Featured icon area -->
     <div class="absolute top-6 right-6 z-10 flex gap-2"><span class="tag-new text-xs font-extrabold px-3 py-1 rounded-full text-white uppercase tracking-wider">NOVO!</span>
     </div>
     <div class="relative z-10 p-6 flex flex-col justify-end" style="min-height: 280px;">
      <div class="mb-2"><span class="text-xs font-bold px-2 py-0.5 rounded-full" style="background: rgba(255,215,0,0.2); color: var(--secondary-action);">📢 DESTAQUE</span>
      </div>
      <h2 id="featuredTitle" class="font-brawl text-2xl md:text-3xl mb-2 leading-tight" style="text-shadow: 2px 3px 0 rgba(0,0,0,0.5);">TEMPORADA 28: CIDADE SELVAGEM CHEGOU!</h2>
      <p id="featuredDesc" class="text-sm md:text-base font-semibold mb-4" style="color: rgba(255,255,255,0.75);">Explore o novo tema, novos brawlers, skins exclusivas e muito mais nesta temporada épica!</p>
      <div class="flex items-center justify-between">
       <div class="flex items-center gap-3"><button class="like-btn flex items-center gap-1 text-sm font-bold" style="color: rgba(255,255,255,0.6);" onclick="toggleLike(this)"> <i data-lucide="heart" style="width:18px;height:18px;"></i> <span class="like-count">2.4k</span> </button> <button class="share-btn flex items-center gap-1 text-sm font-bold" style="color: rgba(255,255,255,0.6);"> <i data-lucide="share-2" style="width:16px;height:16px;"></i> </button>
       </div><span class="time-badge flex items-center gap-1"> <i data-lucide="clock" style="width:12px;height:12px;"></i> 2h atrás </span>
      </div>
     </div>
    </section><!-- News Grid -->
    <div id="newsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
    </div><!-- Empty State -->
    <div id="emptyState" class="hidden text-center py-16">
     <div class="text-6xl mb-4">
      🔍
     </div>
     <p class="font-brawl text-xl" style="color: rgba(255,255,255,0.4);">Nenhuma notícia encontrada</p>
    </div>
   </main><!-- Scroll to top --> <button class="scroll-top-btn" id="scrollTopBtn"> <i data-lucide="chevron-up" style="width:24px;height:24px;"></i> </button>
  </div>
  <script>
    // ===== NEWS DATA =====
    const newsData = [
      {
        id: 1, cat: 'new', tag: 'NOVO', tagClass: 'tag-new',
        emoji: '🤖',
        title: 'NOVO BRAWLER: VOLT!',
        desc: 'Um robô eletrizante com ataques de raio! Desbloqueie no Passe de Brawl.',
        time: '4h atrás', likes: 1823
      },
      {
        id: 2, cat: 'event', tag: 'EVENTO', tagClass: 'tag-event',
        emoji: '🏆',
        title: 'CAMPEONATO MUNDIAL 2025',
        desc: 'As finais acontecem em Seul! Assista ao vivo e ganhe drops exclusivos.',
        time: '6h atrás', likes: 3421
      },
      {
        id: 3, cat: 'update', tag: 'UPDATE', tagClass: 'tag-update',
        emoji: '🗺️',
        title: 'NOVOS MAPAS DE CAÇA-ESTRELAS',
        desc: '4 novos mapas competitivos chegaram com a atualização de hoje.',
        time: '8h atrás', likes: 987
      },
      {
        id: 4, cat: 'balance', tag: 'BALANCE', tagClass: 'tag-balance',
        emoji: '⚖️',
        title: 'NOTAS DE BALANCEAMENTO',
        desc: 'Leon, Crow e Meg receberam ajustes. Confira todas as mudanças.',
        time: '12h atrás', likes: 2156
      },
      {
        id: 5, cat: 'community', tag: 'COMUNIDADE', tagClass: 'tag-community',
        emoji: '🎨',
        title: 'CONCURSO DE SKINS #14',
        desc: 'Envie sua arte de skin! Os vencedores terão as skins no jogo.',
        time: '1d atrás', likes: 4502
      },
      {
        id: 6, cat: 'event', tag: 'EVENTO', tagClass: 'tag-event',
        emoji: '🎁',
        title: 'FIM DE SEMANA ESPECIAL',
        desc: 'Recompensas em dobro! Tokens x2 e mega caixas grátis por tempo limitado.',
        time: '1d atrás', likes: 5621
      },
      {
        id: 7, cat: 'new', tag: 'NOVO', tagClass: 'tag-new',
        emoji: '💎',
        title: 'SKINS CROMÁTICAS EXCLUSIVAS',
        desc: '3 novas skins cromáticas disponíveis na loja por tempo limitado.',
        time: '2d atrás', likes: 1345
      },
      {
        id: 8, cat: 'update', tag: 'UPDATE', tagClass: 'tag-update',
        emoji: '🔧',
        title: 'CORREÇÕES E MELHORIAS',
        desc: 'Bugs corrigidos, performance melhorada e novos efeitos visuais.',
        time: '2d atrás', likes: 678
      }
    ];

    let currentCat = 'all';
    let searchQuery = '';
    const likedCards = new Set();

    // ===== RENDER NEWS CARDS =====
    function renderNews() {
      const grid = document.getElementById('newsGrid');
      const banner = document.getElementById('featuredBanner');
      const empty = document.getElementById('emptyState');

      let filtered = newsData;
      if (currentCat !== 'all') {
        filtered = filtered.filter(n => n.cat === currentCat);
      }
      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        filtered = filtered.filter(n => n.title.toLowerCase().includes(q) || n.desc.toLowerCase().includes(q));
      }

      // Show/hide featured banner
      if (currentCat === 'all' && !searchQuery) {
        banner.classList.remove('hidden');
      } else if (currentCat === 'new' && !searchQuery) {
        banner.classList.remove('hidden');
      } else {
        banner.classList.add('hidden');
      }

      if (filtered.length === 0) {
        grid.innerHTML = '';
        empty.classList.remove('hidden');
        return;
      }
      empty.classList.add('hidden');

      grid.innerHTML = filtered.map((news, i) => {
        const liked = likedCards.has(news.id);
        const likeCount = liked ? news.likes + 1 : news.likes;
        const likeStr = likeCount >= 1000 ? (likeCount / 1000).toFixed(1) + 'k' : likeCount;

        return `
          <article class="news-card card-surface rounded-2xl overflow-hidden animate-card" style="animation-delay: ${0.1 + i * 0.08}s;" data-cat="${news.cat}">
            <div class="p-5">
              <div class="flex items-start justify-between mb-3">
                <div class="flex items-center gap-3">
                  <div class="w-12 h-12 rounded-xl flex items-center justify-center text-2xl" style="background: linear-gradient(135deg, rgba(255,107,0,0.2), rgba(255,215,0,0.1));">
                    ${news.emoji}
                  </div>
                  <div>
                    <span class="${news.tagClass} text-[10px] font-extrabold px-2 py-0.5 rounded-full text-white uppercase tracking-wider">${news.tag}</span>
                  </div>
                </div>
                <span class="time-badge flex items-center gap-1 mt-1">
                  <i data-lucide="clock" style="width:11px;height:11px;"></i> ${news.time}
                </span>
              </div>
              <h3 class="font-brawl text-base md:text-lg mb-2 leading-snug" style="color: var(--text-color);">${news.title}</h3>
              <p class="text-sm font-semibold mb-4" style="color: rgba(255,255,255,0.55);">${news.desc}</p>
              <div class="flex items-center justify-between pt-2" style="border-top: 1px solid rgba(255,255,255,0.06);">
                <div class="flex items-center gap-3">
                  <button class="like-btn flex items-center gap-1 text-sm font-bold ${liked ? 'liked' : ''}" style="color: ${liked ? '#ff4081' : 'rgba(255,255,255,0.45)'};" onclick="toggleLikeCard(${news.id}, this)">
                    <i data-lucide="heart" style="width:16px;height:16px;${liked ? 'fill:#ff4081;' : ''}"></i>
                    <span class="like-count">${likeStr}</span>
                  </button>
                  <button class="share-btn flex items-center gap-1 text-sm font-bold" style="color: rgba(255,255,255,0.45);">
                    <i data-lucide="share-2" style="width:14px;height:14px;"></i>
                  </button>
                </div>
                <button class="text-xs font-extrabold px-3 py-1.5 rounded-lg transition-colors" style="background: var(--primary-action); color: white;" onmouseover="this.style.background='var(--secondary-action)';this.style.color='#1a0a2e'" onmouseout="this.style.background='var(--primary-action)';this.style.color='white'">
                  LER MAIS
                </button>
              </div>
            </div>
          </article>
        `;
      }).join('');

      lucide.createIcons();
    }

    // ===== INTERACTIONS =====
    function toggleLike(btn) {
      btn.classList.toggle('liked');
      const span = btn.querySelector('.like-count');
      if (btn.classList.contains('liked')) {
        btn.style.color = '#ff4081';
        span.textContent = '2.5k';
      } else {
        btn.style.color = 'rgba(255,255,255,0.6)';
        span.textContent = '2.4k';
      }
      lucide.createIcons();
    }

    function toggleLikeCard(id, btn) {
      if (likedCards.has(id)) likedCards.delete(id);
      else likedCards.add(id);
      renderNews();
    }

    // Category tabs
    document.getElementById('categoryNav').addEventListener('click', e => {
      const tab = e.target.closest('.nav-tab');
      if (!tab) return;
      document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentCat = tab.dataset.cat;
      renderNews();
    });

    // Search
    document.getElementById('searchToggle').addEventListener('click', () => {
      const bar = document.getElementById('searchBar');
      bar.classList.toggle('hidden');
      if (!bar.classList.contains('hidden')) {
        document.getElementById('searchInput').focus();
      }
    });
    document.getElementById('searchClose').addEventListener('click', () => {
      document.getElementById('searchBar').classList.add('hidden');
      document.getElementById('searchInput').value = '';
      searchQuery = '';
      renderNews();
    });
    document.getElementById('searchInput').addEventListener('input', e => {
      searchQuery = e.target.value;
      renderNews();
    });

    // Scroll to top
    const wrapper = document.getElementById('appWrapper');
    const scrollBtn = document.getElementById('scrollTopBtn');
    wrapper.addEventListener('scroll', () => {
      scrollBtn.classList.toggle('visible', wrapper.scrollTop > 300);
    });
    scrollBtn.addEventListener('click', () => {
      wrapper.scrollTo({ top: 0, behavior: 'smooth' });
    });

    // ===== ELEMENT SDK =====
    const defaultConfig = {
      background_color: '#1a0a2e',
      surface_color: '#2d1b4e',
      text_color: '#ffffff',
      primary_action: '#ff6b00',
      secondary_action: '#ffd700',
      font_family: 'Nunito',
      font_size: 14,
      site_title: 'BRAWL NEWS',
      featured_title: 'TEMPORADA 28: CIDADE SELVAGEM CHEGOU!',
      featured_desc: 'Explore o novo tema, novos brawlers, skins exclusivas e muito mais nesta temporada épica!'
    };

    function applyConfig(config) {
      const root = document.documentElement.style;
      const bg = config.background_color || defaultConfig.background_color;
      const sf = config.surface_color || defaultConfig.surface_color;
      const tx = config.text_color || defaultConfig.text_color;
      const pa = config.primary_action || defaultConfig.primary_action;
      const sa = config.secondary_action || defaultConfig.secondary_action;
      const ff = config.font_family || defaultConfig.font_family;
      const fs = config.font_size || defaultConfig.font_size;

      root.setProperty('--bg-color', bg);
      root.setProperty('--surface-color', sf);
      root.setProperty('--text-color', tx);
      root.setProperty('--primary-action', pa);
      root.setProperty('--secondary-action', sa);

      document.body.style.fontFamily = `${ff}, Nunito, sans-serif`;
      document.body.style.fontSize = `${fs}px`;

      const titleEl = document.getElementById('siteTitle');
      if (titleEl) {
        titleEl.textContent = config.site_title || defaultConfig.site_title;
        titleEl.style.color = sa;
      }

      const featTitle = document.getElementById('featuredTitle');
      if (featTitle) featTitle.textContent = config.featured_title || defaultConfig.featured_title;

      const featDesc = document.getElementById('featuredDesc');
      if (featDesc) featDesc.textContent = config.featured_desc || defaultConfig.featured_desc;

      // Re-apply surface colors to cards
      document.querySelectorAll('.card-surface').forEach(el => {
        el.style.background = sf;
      });
      document.querySelectorAll('.news-card h3').forEach(el => {
        el.style.color = tx;
      });
    }

    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (config) => {
        applyConfig(config);
      },
      mapToCapabilities: (config) => ({
        recolorables: [
          {
            get: () => config.background_color || defaultConfig.background_color,
            set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); }
          },
          {
            get: () => config.surface_color || defaultConfig.surface_color,
            set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); }
          },
          {
            get: () => config.text_color || defaultConfig.text_color,
            set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); }
          },
          {
            get: () => config.primary_action || defaultConfig.primary_action,
            set: (v) => { config.primary_action = v; window.elementSdk.setConfig({ primary_action: v }); }
          },
          {
            get: () => config.secondary_action || defaultConfig.secondary_action,
            set: (v) => { config.secondary_action = v; window.elementSdk.setConfig({ secondary_action: v }); }
          }
        ],
        borderables: [],
        fontEditable: {
          get: () => config.font_family || defaultConfig.font_family,
          set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); }
        },
        fontSizeable: {
          get: () => config.font_size || defaultConfig.font_size,
          set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); }
        }
      }),
      mapToEditPanelValues: (config) => new Map([
        ['site_title', config.site_title || defaultConfig.site_title],
        ['featured_title', config.featured_title || defaultConfig.featured_title],
        ['featured_desc', config.featured_desc || defaultConfig.featured_desc]
      ])
    });

    // Initial render
    renderNews();
    lucide.createIcons();
  </script>
